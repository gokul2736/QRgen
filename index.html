<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Link QR Generator</title>
    <style>
        body { 
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-color: #c9d6ff;
            background: linear-gradient(to right, #e2e2e2, #c9d6ff);
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.35); 
            text-align: center; 
            width: 100%; 
            max-width: 800px; /* Widened to accommodate a grid of QR codes */
        }
        
        textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: none; 
            background-color: #eee;
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 13px; 
            outline: none;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        .main-btn { 
            background-color: #512da8; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: opacity 0.2s; 
            width: 100%;
            max-width: 300px;
        }
        
        .main-btn:hover { opacity: 0.9; }

        /* Grid layout for multiple QR results */
        #results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
            width: 100%;
        }

        .qr-card {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .qr-title {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin: 0 0 15px 0;
            word-break: break-all;
            background: #eee;
            padding: 5px 10px;
            border-radius: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .qr-wrapper {
            margin-bottom: 15px;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .action-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .action-btn { 
            flex: 1;
            background: #ffffff; 
            color: #512da8; 
            border: 1px solid #512da8; 
            padding: 8px 5px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        
        .action-btn:hover { background: #f4f0ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h2 style="margin-top: 0; margin-bottom: 20px; font-weight: 600; color: #333;">Multi-Link QR Generator</h2>
    <textarea id="textInput" placeholder="Paste a paragraph containing multiple links here..."></textarea>
    
    <button class="main-btn" onclick="processInput()">Generate QR Codes</button>
    
    <div id="results-container"></div>
</div>

<script>
    const resultsContainer = document.getElementById("results-container");

    function getDomainKeyword(urlStr) {
        try {
            const url = new URL(urlStr);
            return url.hostname.replace('www.', '');
        } catch (e) {
            return "Raw Text";
        }
    }

    function processInput() {
        const rawText = document.getElementById("textInput").value.trim();
        if (!rawText) return alert("Please enter some text.");

        resultsContainer.innerHTML = ""; // Clear previous results

        // Regex to extract all URLs
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        // Use a Set to remove duplicate links if the user pasted the same one twice
        const foundLinks = [...new Set(rawText.match(urlRegex) || [])];

        if (foundLinks.length === 0) {
            // No links found, generate one for the raw text
            createQRCard(rawText, "Raw Text Input");
        } else {
            // Loop through every unique link and create a card simultaneously
            foundLinks.forEach((link, index) => {
                const title = getDomainKeyword(link);
                createQRCard(link, title, index);
            });
        }
    }

    function createQRCard(data, titleText, index = 0) {
        // 1. Create the Card Container
        const card = document.createElement("div");
        card.className = "qr-card";

        // 2. Create the Title/Label
        const title = document.createElement("div");
        title.className = "qr-title";
        title.innerText = titleText;
        card.appendChild(title);

        // 3. Create the QR Wrapper
        const qrWrapper = document.createElement("div");
        qrWrapper.className = "qr-wrapper";
        card.appendChild(qrWrapper);

        // 4. Generate the QR Code inside the wrapper
        new QRCode(qrWrapper, {
            text: data,
            width: 150, // Slightly smaller for grid layout
            height: 150,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H 
        });

        // 5. Create the Action Buttons (Copy / Download)
        const actionGroup = document.createElement("div");
        actionGroup.className = "action-group";

        const copyBtn = document.createElement("button");
        copyBtn.className = "action-btn";
        copyBtn.innerText = "Copy";
        copyBtn.onclick = () => copyQR(qrWrapper);

        const downloadBtn = document.createElement("button");
        downloadBtn.className = "action-btn";
        downloadBtn.innerText = "Download";
        downloadBtn.onclick = () => downloadQR(qrWrapper, titleText, index);

        // Hide buttons initially, show after a tiny delay to ensure canvas renders
        actionGroup.style.display = "none";
        setTimeout(() => { actionGroup.style.display = "flex"; }, 150);

        actionGroup.appendChild(copyBtn);
        actionGroup.appendChild(downloadBtn);
        card.appendChild(actionGroup);

        // 6. Add card to the main grid
        resultsContainer.appendChild(card);
    }

    // Pass the specific wrapper to ensure we copy the right canvas
    async function copyQR(wrapperElement) {
        const canvas = wrapperElement.querySelector("canvas");
        if (!canvas) return;

        try {
            canvas.toBlob(async (blob) => {
                const item = new ClipboardItem({ "image/png": blob });
                await navigator.clipboard.write([item]);
                alert("QR Code copied!");
            });
        } catch (err) {
            alert("Clipboard access blocked. Right-click the image to copy.");
        }
    }

    // Pass the specific wrapper to ensure we download the right canvas
    function downloadQR(wrapperElement, titleText, index) {
        const canvas = wrapperElement.querySelector("canvas");
        if (!canvas) return;
        
        const sourceUrl = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = sourceUrl;
        // Clean up the title for the filename
        const safeName = titleText.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        link.download = `qr_${safeName}_${index}.png`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
